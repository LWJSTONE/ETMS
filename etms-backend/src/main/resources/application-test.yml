server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: etms-backend
  
  # 使用 H2 内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:etms;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # 启用 SQL 初始化脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  
  # 禁用 Redis 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
  
  # 解决 Swagger 与 Spring MVC 的兼容性问题
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.etms.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: etms-jwt-secret-key-2026-enterprise-training-management-system
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.etms: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 自定义配置
etms:
  file:
    upload-path: /home/z/my-project/ETMS/upload/
    access-path: /files/**
  security:
    ignore-urls:
      - /auth/login
      - /auth/captcha
      - /auth/register
      - /files/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /doc.html
      - /h2-console/**
