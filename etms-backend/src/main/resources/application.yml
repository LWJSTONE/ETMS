server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: etms-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/etms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: EtmsHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        min-idle: 0
        max-idle: 10
        max-active: 20
        max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.etms.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: etms-jwt-secret-key-2026-enterprise-training-management-system
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.etms: debug
    org.springframework: info
  file:
    name: logs/etms.log
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# 自定义配置
etms:
  file:
    upload-path: /home/z/my-project/ETMS/upload/
    access-path: /files/**
  security:
    ignore-urls:
      - /auth/login
      - /auth/captcha
      - /auth/register
      - /files/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /doc.html
